name: Security CodeQL Python scan
on:
  workflow_dispatch:
  schedule:
    - cron: "35 9 * * MON-FRI" # Every weekday

jobs:
  security-codeql-python-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL Python code scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql.yml@9b8ab5d626debf71c4acb94dbaabccc04e9149b4 # v2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      languages: python
    secrets: inherit

