name: Security veracode policy scan

on:
  workflow_dispatch:
  schedule:
    - cron: "10 9 * * 1" # Every Monday at 09:10 UTC

permissions:
  contents: read
  actions: read
  security-events: write
  
jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@9b8ab5d626debf71c4acb94dbaabccc04e9149b4 # v2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      docker_image_app_dir: '/app'
    secrets: inherit
